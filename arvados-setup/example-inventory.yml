### Example inventory for install-pgpi-cluster.yml ###

# Default variables for all hosts.
all:
  vars:
    ansible_user: pgpadmin
    arvados_tls:
      Default:
        cert: "/etc/ssl/certs/{{ inventory_hostname }}.pem"
        key: "/etc/ssl/private/{{ inventory_hostname }}.key"
        remote: true
    dns_resolver: "172.17.0.1"

    hgram_RailsAPI_internal_port: 8080

    hgram_Keepstore_internal_port: 8088

    hgram_Keepbalance_internal_port: 8089

    hgram_Websocket_internal_port: 8040
    hgram_Websocket_external_port: 8440

    hgram_Controller_internal_port: 8043
    hgram_Controller_external_port: 8443

    hgram_ContainerWebServices_port_min: 8900
    hgram_ContainerWebServices_port_max: 8999

    hgram_Keepproxy_internal_port: 8044
    hgram_Keepproxy_external_port: 8444

    hgram_WebDAV_internal_port: 8048
    hgram_WebDAV_external_port: 8448

# Hosts in the federation are grouped by their roles -- login cluster vs.
# satellite clusters. In this example, satellite clusters run the latest
# developmental version of Arvados.
hgram_federation:
  children:
    hgram_login_cluster:
    hgram_satellite_clusters:
      vars:
        arvados_apt_suites: "-dev"
        hgram_login_delegation_host: "{{ groups['hgram_login_cluster'][0] | default('') }}"

# Customizable host-specific information, including passwords, secrets, and
# settings specific to the host roles (login cluster vs. satellite).
# To generate passwords or secrets, you can use the following command:
#     tr -dc A-Za-z0-9 </dev/urandom | head -c 64
hgram_login_cluster:
  hosts:
    xlogn.your-domain.example:
      arvados_cluster_id: xlogn
      hgram_postgresql_password: "FIXMEFIXME"
      hgram_management_token: "FIXMEFIXME"
      hgram_system_root_token: "FIXMEFIXME"
      hgram_blob_signing_key: "FIXMEFIXME"
      hgram_google_login_client_secrets_path: /PATH/TO/GOOGLE/LOGIN/CREDS.json
      hgram_login_cluster_trusted_clients:
        - "https://*.your-domain.example"

hgram_satellite_clusters:
  hosts:
    xurs1.your-domain.example:
      arvados_cluster_id: xurs1
      hgram_postgresql_password: "FIXMEFIXME"
      hgram_management_token: "FIXMEFIXME"
      hgram_system_root_token: "FIXMEFIXME"
      hgram_blob_signing_key: "FIXMEFIXME"

    xurs2.your-domain.example:
      arvados_cluster_id: xurs2
      hgram_postgresql_password: "FIXMEFIXME"
      hgram_management_token: "FIXMEFIXME"
      hgram_system_root_token: "FIXMEFIXME"
      hgram_blob_signing_key: "FIXMEFIXME"

### Arvados services ###
# The rest of the inventory defines the Arvados services to run on the
# cluster host. You should not need to change anything from here on.
arvados_postgresql:
  children:
    hgram_federation:
  vars:
    arvados_postgresql_config: {}
    arvados_postgresql_hba_sources:
      - samehost

arvados_api:
  children:
    hgram_federation:

arvados_controller:
  children:
    hgram_federation:

arvados_websocket:
  children:
    hgram_federation:

arvados_keepstore:
  children:
    hgram_federation:

arvados_keepproxy:
  children:
    hgram_federation:

arvados_keep_web:
  children:
    hgram_federation:

arvados_workbench:
  children:
    hgram_federation:

arvados_dispatch_local:
  children:
    hgram_federation:
